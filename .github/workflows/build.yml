name: Build Android

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'PRIVACY.md'
      - 'CONTRIBUTING.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build signed release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Generate Android icons and splash from logo
        if: ${{ hashFiles('resources/icon.png') != '' }}
        run: |
          npx capacitor-assets generate --android
          mkdir -p www/img
          cp resources/icon.png www/img/logo.png

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 secret is empty — Firebase will not work"
            exit 0
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode > android/app/google-services.json
          echo "google-services.json restored, $(wc -c < android/app/google-services.json) bytes"

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        working-directory: android
        run: chmod +x ./gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore

      - name: Build signed release APK + AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/android/app/release.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Collect release artifacts
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk fcuba-release.apk
          cp android/app/build/outputs/bundle/release/app-release.aab fcuba-release.aab
          ls -lh fcuba-release.apk fcuba-release.aab

      - name: Upload signed APK + AAB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fcuba-release
          path: |
            fcuba-release.apk
            fcuba-release.aab
          if-no-files-found: error

      - name: Publish rolling 'latest' release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
          gh release create latest fcuba-release.apk fcuba-release.aab \
            --repo "$GITHUB_REPOSITORY" \
            --title "${GITHUB_SHA::7}" \
            --notes "" \
            --latest

      - name: Clean keystore
        if: ${{ always() }}
        run: rm -f android/app/release.keystore
